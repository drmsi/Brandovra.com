<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brandovra — Luxury Curated</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:      #0d1117;
      --navy-light:#161b22;
      --navy-card: #1a2030;
      --silver:    #c0c0c0;
      --silver-dim:#888;
      --white:     #e8e8e8;
      --gold:      #d4a843;
      --card-ratio: 9 / 16;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--navy);
      color: var(--white);
      font-family: 'Georgia', serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,17,23,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(192,192,192,0.1);
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      gap: 1rem;
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--white);
      text-decoration: none;
      flex-shrink: 0;
    }
    .logo span { color: var(--silver); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
      overflow: hidden;
    }

    .country-breadcrumb {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      white-space: nowrap;
    }

    .back-link {
      font-family: 'Arial', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--silver-dim);
      text-decoration: none;
      border: 1px solid rgba(192,192,192,0.2);
      padding: 0.25rem 0.6rem;
      border-radius: 3px;
      transition: color 0.2s, border-color 0.2s;
    }
    .back-link:hover { color: var(--silver); border-color: var(--silver); }

    .country-name-badge {
      font-family: 'Arial', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--white);
    }

    .header-meta {
      font-family: 'Arial', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--silver-dim);
      white-space: nowrap;
    }

    #refresh-dot {
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0;
      transition: opacity 0.4s;
      margin-left: 0.4rem;
      vertical-align: middle;
    }
    #refresh-dot.active { opacity: 1; }

    /* ── Country Nav ── */
    .country-nav-wrap {
      border-bottom: 1px solid rgba(192,192,192,0.08);
      background: var(--navy-light);
    }

    .country-nav {
      display: flex;
      gap: 0.5rem;
      padding: 0.9rem 1.5rem;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .country-nav::-webkit-scrollbar { display: none; }

    .country-btn {
      flex-shrink: 0;
      background: transparent;
      border: 1px solid rgba(192,192,192,0.18);
      color: var(--silver-dim);
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      font-family: 'Arial', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    .country-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }
    .country-btn.active {
      background: rgba(212,168,67,0.12);
      border-color: var(--gold);
      color: var(--gold);
    }

    .country-btn .count {
      font-size: 0.6rem;
      opacity: 0.65;
      background: rgba(255,255,255,0.08);
      padding: 0.1rem 0.35rem;
      border-radius: 10px;
    }

    /* ── Category Nav ── */
    .category-nav {
      display: flex;
      gap: 0.5rem;
      padding: 0.9rem 1.5rem;
      overflow-x: auto;
      scrollbar-width: none;
      border-bottom: 1px solid rgba(192,192,192,0.06);
    }
    .category-nav::-webkit-scrollbar { display: none; }

    .filter-btn {
      flex-shrink: 0;
      background: transparent;
      border: 1px solid rgba(192,192,192,0.18);
      color: var(--silver-dim);
      padding: 0.3rem 0.9rem;
      border-radius: 2rem;
      font-family: 'Arial', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover,
    .filter-btn.active {
      background: var(--silver);
      border-color: var(--silver);
      color: var(--navy);
    }

    /* ── Section header (country page) ── */
    .section-header {
      padding: 1.5rem 1.5rem 0;
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
    }
    .section-title {
      font-size: 1.25rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: var(--white);
    }
    .section-count {
      font-family: 'Arial', sans-serif;
      font-size: 0.7rem;
      color: var(--silver-dim);
      letter-spacing: 0.08em;
    }

    /* ── Grid ── */
    main { padding: 1.25rem 1.5rem 4rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 0.875rem;
    }
    @media (min-width: 540px)  { .grid { grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); } }
    @media (min-width: 900px)  { .grid { grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); } }
    @media (min-width: 1280px) { .grid { grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); } }

    /* ── Card ── */
    .card {
      position: relative;
      aspect-ratio: var(--card-ratio);
      border-radius: 8px;
      overflow: hidden;
      background: var(--navy-card);
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,0.6); }

    .card-media {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .card-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .card-media iframe {
      width: 100%;
      height: 100%;
      border: none;
      pointer-events: none;
    }

    /* gradient */
    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 38%, rgba(13,17,23,0.5) 60%, rgba(13,17,23,0.95) 100%);
      pointer-events: none;
    }

    /* country flag badge (top-right) */
    .card-flag {
      position: absolute;
      top: 0.55rem;
      right: 0.55rem;
      z-index: 3;
      font-size: 1.1rem;
      line-height: 1;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,0.8));
    }

    .card-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0.875rem 0.75rem 0.7rem;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 0.18rem;
    }

    .card-brand {
      font-family: 'Arial', sans-serif;
      font-size: 0.58rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--silver);
    }
    .card-title {
      font-size: 0.82rem;
      font-weight: 400;
      line-height: 1.3;
      color: var(--white);
    }
    .card-price {
      font-family: 'Arial', sans-serif;
      font-size: 0.78rem;
      color: var(--gold);
      margin-top: 0.12rem;
    }
    .card-cta {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 0.45rem;
      padding: 0.42rem 0;
      background: var(--silver);
      color: var(--navy);
      border: none;
      border-radius: 3px;
      font-family: 'Arial', sans-serif;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .card-cta:hover { background: var(--white); }

    /* ── Skeleton ── */
    .skeleton {
      aspect-ratio: var(--card-ratio);
      border-radius: 8px;
      background: var(--navy-card);
      overflow: hidden;
      position: relative;
    }
    .skeleton::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(192,192,192,0.05) 50%, transparent);
      animation: shimmer 1.6s infinite;
    }
    @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

    /* ── Empty / Error ── */
    .empty {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 5rem 2rem;
      color: var(--silver-dim);
      font-family: 'Arial', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .empty svg { opacity: 0.25; }

    .error-banner {
      grid-column: 1 / -1;
      padding: 1rem 1.5rem;
      background: rgba(180,50,50,0.12);
      border: 1px solid rgba(180,50,50,0.25);
      border-radius: 6px;
      font-family: 'Arial', sans-serif;
      font-size: 0.78rem;
      color: #e88;
      text-align: center;
    }

    /* ── Modal ── */
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(7,9,14,0.96);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
    }
    #modal.open { display: flex; }

    .modal-inner {
      position: relative;
      display: flex;
      gap: 2rem;
      align-items: stretch;
      max-width: 860px;
      width: 100%;
      padding: 2rem 1.5rem;
      max-height: 96vh;
    }

    .modal-reel {
      flex-shrink: 0;
      width: min(300px, 40vw);
      aspect-ratio: 9 / 16;
      border-radius: 10px;
      overflow: hidden;
      background: var(--navy-card);
    }
    .modal-reel img, .modal-reel iframe {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border: none;
      display: block;
    }

    .modal-details {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 0.85rem;
      padding-right: 2.5rem;
    }

    .modal-country-tag {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-family: 'Arial', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid rgba(212,168,67,0.3);
      padding: 0.25rem 0.65rem;
      border-radius: 3px;
      align-self: flex-start;
    }

    .modal-category {
      font-family: 'Arial', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--silver-dim);
    }
    .modal-brand {
      font-family: 'Arial', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--silver);
    }
    .modal-title {
      font-size: 1.5rem;
      font-weight: 400;
      line-height: 1.25;
      color: var(--white);
    }
    .modal-price {
      font-family: 'Arial', sans-serif;
      font-size: 1.15rem;
      color: var(--gold);
    }
    .modal-desc {
      font-size: 0.85rem;
      line-height: 1.65;
      color: var(--silver-dim);
      font-family: 'Arial', sans-serif;
    }
    .modal-cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.85rem 2rem;
      background: var(--silver);
      color: var(--navy);
      border: none;
      border-radius: 3px;
      font-family: 'Arial', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      align-self: flex-start;
      transition: background 0.2s, transform 0.15s;
      margin-top: 0.25rem;
    }
    .modal-cta:hover { background: var(--white); transform: translateY(-1px); }

    .modal-close {
      position: absolute;
      top: 1.25rem;
      right: 1.25rem;
      background: rgba(192,192,192,0.08);
      border: 1px solid rgba(192,192,192,0.18);
      color: var(--silver);
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
    }
    .modal-close:hover { background: rgba(192,192,192,0.18); }

    @media (max-width: 600px) {
      .modal-inner { flex-direction: column; align-items: center; overflow-y: auto; padding: 1rem; }
      .modal-reel { width: min(240px, 75vw); }
      .modal-details { padding-right: 0; align-items: center; text-align: center; }
      .modal-country-tag, .modal-cta { align-self: center; }
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid rgba(192,192,192,0.07);
      padding: 2rem 1.5rem;
      text-align: center;
      font-family: 'Arial', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(192,192,192,0.25);
    }
  </style>
</head>
<body>

  <!-- SPA routing restore (GitHub Pages 404 redirect trick) -->
  <script>
    (function(l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function(s) {
          return s.replace(/~and~/g, '&');
        }).join('?');
        window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
      }
    }(window.location));
  </script>

  <header>
    <a href="/" class="logo" id="logo">Brand<span>ovra</span></a>
    <div class="header-right">
      <div id="country-breadcrumb"></div>
      <span class="header-meta">Luxury Curated<span id="refresh-dot"></span></span>
    </div>
  </header>

  <!-- Country filter nav (homepage only) -->
  <div class="country-nav-wrap" id="country-nav-wrap" style="display:none">
    <nav class="country-nav" id="country-nav"></nav>
  </div>

  <!-- Category filter nav -->
  <nav class="category-nav" id="category-nav">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="fashion">Fashion</button>
    <button class="filter-btn" data-filter="jewelry">Jewelry</button>
    <button class="filter-btn" data-filter="bags">Bags</button>
    <button class="filter-btn" data-filter="footwear">Footwear</button>
    <button class="filter-btn" data-filter="beauty">Beauty</button>
    <button class="filter-btn" data-filter="watches">Watches</button>
  </nav>

  <main>
    <div id="section-header"></div>
    <div class="grid" id="grid"></div>
  </main>

  <!-- Modal -->
  <div id="modal" role="dialog" aria-modal="true" aria-label="Product detail">
    <div class="modal-inner">
      <button class="modal-close" id="modal-close" aria-label="Close">&#x2715;</button>
      <div class="modal-reel" id="modal-media"></div>
      <div class="modal-details">
        <div class="modal-country-tag" id="modal-country-tag" style="display:none"></div>
        <p class="modal-category" id="modal-category"></p>
        <p class="modal-brand" id="modal-brand"></p>
        <h2 class="modal-title" id="modal-title"></h2>
        <p class="modal-price" id="modal-price"></p>
        <p class="modal-desc" id="modal-desc"></p>
        <a class="modal-cta" id="modal-cta" href="#" target="_blank" rel="noopener sponsored">
          Shop Now &rarr;
        </a>
      </div>
    </div>
  </div>

  <footer>
    &copy; <span id="yr"></span> Brandovra &mdash; As an affiliate we may earn a commission on qualifying purchases.
  </footer>

  <script>
    // ── Config ─────────────────────────────────────────────────────────────
    const REPO    = 'drmsi/Brandovra.com';
    const FOLDER  = 'products';
    const API_URL = `https://api.github.com/repos/${REPO}/contents/${FOLDER}`;
    const REFRESH_MS = 5 * 60 * 1000;

    const COUNTRIES = {
      kw: { name: 'Kuwait',         flag: '🇰🇼' },
      ae: { name: 'UAE',            flag: '🇦🇪' },
      sa: { name: 'Saudi Arabia',   flag: '🇸🇦' },
      bh: { name: 'Bahrain',        flag: '🇧🇭' },
      qa: { name: 'Qatar',          flag: '🇶🇦' },
      om: { name: 'Oman',           flag: '🇴🇲' },
      jo: { name: 'Jordan',         flag: '🇯🇴' },
      eg: { name: 'Egypt',          flag: '🇪🇬' },
      us: { name: 'United States',  flag: '🇺🇸' },
      gb: { name: 'United Kingdom', flag: '🇬🇧' },
      fr: { name: 'France',         flag: '🇫🇷' },
      de: { name: 'Germany',        flag: '🇩🇪' },
      jp: { name: 'Japan',          flag: '🇯🇵' },
      au: { name: 'Australia',      flag: '🇦🇺' },
      ca: { name: 'Canada',         flag: '🇨🇦' },
    };

    // ── State ──────────────────────────────────────────────────────────────
    let allProducts   = [];
    let activeCountry = null; // null = show all
    let activeCategory = 'all';

    // ── DOM refs ───────────────────────────────────────────────────────────
    const grid             = document.getElementById('grid');
    const modal            = document.getElementById('modal');
    const modalClose       = document.getElementById('modal-close');
    const refreshDot       = document.getElementById('refresh-dot');
    const countryNavWrap   = document.getElementById('country-nav-wrap');
    const countryNavEl     = document.getElementById('country-nav');
    const countryBreadcrumb= document.getElementById('country-breadcrumb');
    const sectionHeader    = document.getElementById('section-header');
    document.getElementById('yr').textContent = new Date().getFullYear();

    // ── URL parsing ─────────────────────────────────────────────────────────
    function getCountryFromPath() {
      const seg = window.location.pathname.replace(/^\//, '').replace(/\/$/, '').toLowerCase();
      // Only treat as country if it looks like a 2-3 letter country code
      return (seg && /^[a-z]{2,3}$/.test(seg)) ? seg : null;
    }

    // ── Sync page state from current URL ───────────────────────────────────
    function syncFromURL() {
      activeCountry = getCountryFromPath();
      updateHeader();
      renderCountryNav();
      renderSectionHeader();
    }

    function countryInfo(code) {
      if (!code) return null;
      return COUNTRIES[code] || { name: code.toUpperCase(), flag: '🌍' };
    }

    // ── Update header ──────────────────────────────────────────────────────
    function updateHeader() {
      if (activeCountry) {
        const c = countryInfo(activeCountry);
        countryBreadcrumb.innerHTML =
          `<div class="country-breadcrumb">` +
          `<a href="/" class="back-link">&#8592; All</a>` +
          `<span class="country-name-badge">${c.flag} ${escHtml(c.name)}</span>` +
          `</div>`;
        document.title = `Brandovra — ${c.name}`;
      } else {
        countryBreadcrumb.innerHTML = '';
        document.title = 'Brandovra — Luxury Curated';
      }
    }

    // ── Section header ─────────────────────────────────────────────────────
    function renderSectionHeader() {
      if (!activeCountry) { sectionHeader.innerHTML = ''; return; }
      const c = countryInfo(activeCountry);
      const visible = filteredProducts();
      sectionHeader.innerHTML =
        `<div class="section-header">` +
        `<span class="section-title">${c.flag} ${escHtml(c.name)}</span>` +
        `<span class="section-count">${visible.length} item${visible.length !== 1 ? 's' : ''}</span>` +
        `</div>`;
    }

    // ── Country nav ────────────────────────────────────────────────────────
    function renderCountryNav() {
      // Hide on country-specific pages
      if (activeCountry) {
        countryNavWrap.style.display = 'none';
        return;
      }

      // Count products per country
      const counts = {};
      allProducts.forEach(p => {
        if (p.country) counts[p.country] = (counts[p.country] || 0) + 1;
      });
      const presentCodes = Object.keys(counts).sort();

      // Hide if only one country
      if (presentCodes.length < 2) {
        countryNavWrap.style.display = 'none';
        return;
      }

      const total = allProducts.length;
      let html = `<button class="country-btn active" data-country="">🌍 All <span class="count">${total}</span></button>`;
      presentCodes.forEach(code => {
        const c = countryInfo(code);
        html += `<button class="country-btn" data-country="${escHtml(code)}">${c.flag} ${escHtml(c.name)} <span class="count">${counts[code]}</span></button>`;
      });
      countryNavEl.innerHTML = html;
      countryNavWrap.style.display = 'block';

      countryNavEl.querySelectorAll('.country-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const code = btn.dataset.country;
          window.history.pushState({}, '', code ? '/' + code : '/');
          syncFromURL();
          renderGrid();
        });
      });
    }

    // ── Category nav ────────────────────────────────────────────────────────
    document.getElementById('category-nav').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCategory = btn.dataset.filter;
      renderGrid();
      renderSectionHeader();
    });

    // ── Filtered product list ──────────────────────────────────────────────
    function filteredProducts() {
      let list = allProducts;
      if (activeCountry) {
        list = list.filter(p => (p.country || '').toLowerCase() === activeCountry);
      }
      if (activeCategory !== 'all') {
        list = list.filter(p => (p.category || '').toLowerCase() === activeCategory);
      }
      return list;
    }

    // ── Render grid ────────────────────────────────────────────────────────
    function renderGrid() {
      const visible = filteredProducts();
      if (!visible.length) { renderEmpty(); return; }

      // Show flag badge only on homepage (multiple countries visible)
      const showFlag = !activeCountry;

      grid.innerHTML = visible.map(p => cardHTML(p, showFlag)).join('');
      grid.querySelectorAll('.card').forEach((card, i) => {
        const product = visible[i];
        card.addEventListener('click', e => {
          if (e.target.closest('.card-cta')) return;
          openModal(product);
        });
        card.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openModal(product); }
        });
      });
    }

    function cardHTML(p, showFlag) {
      const c = p.country ? countryInfo(p.country) : null;
      const flagBadge = (showFlag && c) ? `<span class="card-flag" title="${escHtml(c.name)}">${c.flag}</span>` : '';
      return `
        <div class="card" tabindex="0" role="button" aria-label="${escHtml(p.title)}">
          <div class="card-media">${mediaTag(p)}</div>
          ${flagBadge}
          <div class="card-info">
            <span class="card-brand">${escHtml(p.brand || '')}</span>
            <span class="card-title">${escHtml(p.title || '')}</span>
            <span class="card-price">${escHtml(p.price || '')}</span>
            <a class="card-cta" href="${escHtml(p.affiliate_url || '#')}" target="_blank" rel="noopener sponsored">
              Shop Now
            </a>
          </div>
        </div>`;
    }

    function mediaTag(p) {
      if (p.media_type === 'video' && p.drive_file_id) {
        return `<iframe src="https://drive.google.com/file/d/${escHtml(p.drive_file_id)}/preview"
                  allow="autoplay" loading="lazy" title="${escHtml(p.title)}"></iframe>`;
      }
      const src = p.image_url
        || (p.drive_file_id ? `https://lh3.googleusercontent.com/d/${p.drive_file_id}` : '')
        || 'https://images.unsplash.com/photo-1441986300917-64674bd600d8?w=400&h=711&fit=crop';
      return `<img src="${escHtml(src)}" alt="${escHtml(p.title)}" loading="lazy">`;
    }

    // ── Empty / Error ──────────────────────────────────────────────────────
    function renderEmpty() {
      const c = activeCountry ? countryInfo(activeCountry) : null;
      const msg = c ? `No ${c.name} products yet` : 'No products yet';
      grid.innerHTML = `
        <div class="empty">
          <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <path d="M3 9h18M9 21V9"/>
          </svg>
          <span>${escHtml(msg)}</span>
        </div>`;
    }

    function renderError(msg) {
      grid.innerHTML = `<div class="error-banner">Unable to load products — ${escHtml(msg)}</div>`;
    }

    // ── Skeletons ──────────────────────────────────────────────────────────
    function showSkeletons(n = 9) {
      grid.innerHTML = Array(n).fill('<div class="skeleton"></div>').join('');
    }

    // ── Fetch all products ─────────────────────────────────────────────────
    async function loadProducts() {
      try {
        const listRes = await fetch(API_URL, { headers: { 'Accept': 'application/vnd.github+json' } });
        if (!listRes.ok) throw new Error(`GitHub API ${listRes.status}`);
        const files = await listRes.json();

        const jsonFiles = files
          .filter(f => f.name.endsWith('.json'))
          .sort((a, b) => b.name.localeCompare(a.name, undefined, { numeric: true }));

        if (!jsonFiles.length) { allProducts = []; renderEmpty(); return; }

        const results = await Promise.all(
          jsonFiles.map(async file => {
            try {
              const res = await fetch(file.download_url);
              if (!res.ok) return null;
              const data = await res.json();
              data._ts = parseInt(file.name, 10) || 0;
              return data;
            } catch { return null; }
          })
        );

        allProducts = results.filter(Boolean);
        syncFromURL();   // update header + country nav with real data
        renderGrid();

      } catch (err) {
        console.error('Load failed:', err);
        renderError(err.message);
      }
    }

    // ── Modal ──────────────────────────────────────────────────────────────
    function openModal(p) {
      document.getElementById('modal-media').innerHTML = mediaTag(p);

      const cTag = document.getElementById('modal-country-tag');
      if (p.country) {
        const c = countryInfo(p.country);
        cTag.textContent = `${c.flag} ${c.name}`;
        cTag.style.display = 'inline-flex';
      } else {
        cTag.style.display = 'none';
      }

      document.getElementById('modal-category').textContent = (p.category || '').toUpperCase();
      document.getElementById('modal-brand').textContent    = p.brand || '';
      document.getElementById('modal-title').textContent    = p.title || '';
      document.getElementById('modal-price').textContent    = p.price || '';
      document.getElementById('modal-desc').textContent     = p.description || '';
      document.getElementById('modal-cta').href             = p.affiliate_url || '#';

      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      modal.classList.remove('open');
      document.body.style.overflow = '';
      document.getElementById('modal-media').innerHTML = '';
    }

    modalClose.addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ── Popstate (browser back/forward) ────────────────────────────────────
    window.addEventListener('popstate', () => {
      syncFromURL();
      renderGrid();
    });

    // ── Auto-refresh ───────────────────────────────────────────────────────
    async function refresh() {
      refreshDot.classList.add('active');
      await loadProducts();
      setTimeout(() => refreshDot.classList.remove('active'), 800);
    }
    setInterval(refresh, REFRESH_MS);

    // ── Helpers ────────────────────────────────────────────────────────────
    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    // ── Init ───────────────────────────────────────────────────────────────
    showSkeletons(9);
    syncFromURL();  // set header immediately from URL
    loadProducts();
  </script>
</body>
</html>
