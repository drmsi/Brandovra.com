<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Brandovra</title>
  <script>
    // GitHub Pages SPA redirect: encodes the path into a query string
    // so index.html can restore it and handle routing client-side.
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1).join('/') + '/?/' +
      l.pathname.slice(1).replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
